# =====================================================
# MEDISPACE - Docker Compose (DEV / Local)
# Dùng để: phát triển local, không cần DockerHub
# Chạy: docker compose -f docker-compose.dev.yml up --build -d
#
# Kiến trúc dev:
#   - Backend, ML, OCR, Redis, Typesense → Docker containers
#   - Frontend → chạy local: cd MEDISPACE_ECommerce_FE && npm run dev
#   - Không có image: tag (không cần đăng nhập DockerHub)
#   - Mount source code để hot-reload (backend, ml-service)
# =====================================================

services:

  # ── Backend (Node.js / Express / TypeScript) ──────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: medispace-backend-dev
    command: npx nodemon --watch src --ext ts,js,json --exec "tsx ./src/index.ts"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: 8108
      TYPESENSE_AUTO_RECONCILE: "false"
      TYPESENSE_EMBEDDING_ENABLED: "false"
      OCR_SERVICE_URL: http://ocr-service:8001
      PRESCRIPTION_OCR_MODE: ${PRESCRIPTION_OCR_MODE:-parallel}
      ML_SERVICE_URL: http://ml-service:8002
      ML_SERVICE_TOKEN: ${ML_SERVICE_TOKEN:-medispace-dev-ml-token}
      CHAT_AI_URL: http://chat-ai-service:8003
      REDIS_URL: redis://redis:6379
      # Review AI Moderation
      # REVIEW_AI_MOCK=true  → mock mode: dùng magic keywords (dùng cho E2E / Docker dev)
      # REVIEW_AI_MOCK=false → real LLM: gọi https://llm.datateam.space (dùng khi test thật)
      # Đổi thành "false" khi muốn test real LLM trong Docker
      REVIEW_AI_ENABLED: "true"
      REVIEW_AI_MOCK: "true"
      REVIEW_AI_HIDE_CONFIDENCE: "0.78"
      REVIEW_AI_REVIEW_CONFIDENCE: "0.55"
      # Community AI Moderation
      # Dùng LLM thật để pre-check thread/reply/message trước khi public.
      AI_MODERATION_ENABLED: "true"
      AI_MODERATION_MOCK: "false"
      AI_MODERATION_HIDE_CONFIDENCE: "0.78"
      AI_MODERATION_REVIEW_CONFIDENCE: "0.55"
      AI_MODERATION_TIMEOUT_MS: "12000"
      # Kế thừa CUSTOM_LLM_BASE_URL và CUSTOM_LLM_MODEL từ .env (env_file)
      # → https://llm.datateam.space / gemma-4-e4b-it.gguf
    volumes:
      - ./uploads:/app/uploads
      - ./src:/app/src        # Hot-reload: mount source để tsx pick up
    depends_on:
      - redis
      - typesense
      - ml-service
    restart: unless-stopped
    networks:
      - medispace-dev-net


  # ── ML Recommendation Service (Python / FastAPI) ─────────────────────────
  ml-service:
    build:
      context: ../MEDISPACE_Python_Services/MEDISPACE_ML_Service
      dockerfile: Dockerfile
    container_name: medispace-ml-dev
    ports:
      - "8002:8002"
    env_file:
      - ../MEDISPACE_Python_Services/MEDISPACE_ML_Service/.env
    environment:
      BE_SERVICE_URLS: http://backend:8000   # Dev chỉ cần gọi internal
      ML_SERVICE_TOKEN: ${ML_SERVICE_TOKEN:-medispace-dev-ml-token}
    volumes:
      - ../MEDISPACE_Python_Services/MEDISPACE_ML_Service/src:/app/src      # Hot-reload src
      - ../MEDISPACE_Python_Services/MEDISPACE_ML_Service/tests:/app/tests  # Sync test files
      - ml-dev-models:/app/models                                            # Persist trained models
    restart: unless-stopped
    networks:
      - medispace-dev-net

  # ── OCR Service (Python / FastAPI) ───────────────────────────────────────
  ocr-service:
    build:
      context: ../MEDISPACE_Python_Services/MEDISPACE_OCR_Service
      dockerfile: Dockerfile
    container_name: medispace-ocr-dev
    ports:
      - "8001:8001"
    env_file:
      - ../MEDISPACE_Python_Services/MEDISPACE_OCR_Service/.env
    environment:
      CUSTOM_LLM_MAX_TOKENS: ${CUSTOM_LLM_MAX_TOKENS:-4096}
      VISION_LLM_MODEL: ${VISION_LLM_MODEL:-gemma-4-e4b-it.gguf}
      VISION_LLM_TIMEOUT_SECONDS: ${VISION_LLM_TIMEOUT_SECONDS:-75}
      VISION_BRANCH_TIMEOUT_SECONDS: ${VISION_BRANCH_TIMEOUT_SECONDS:-160}
      OCR_RESPONSE_BUDGET_SECONDS: ${OCR_RESPONSE_BUDGET_SECONDS:-170}
      VISION_LLM_MAX_TOKENS: ${VISION_LLM_MAX_TOKENS:-4096}
      VISION_LLM_FREEFORM_MAX_TOKENS: ${VISION_LLM_FREEFORM_MAX_TOKENS:-4096}
      VISION_LLM_FREEFORM_TEMPERATURE: ${VISION_LLM_FREEFORM_TEMPERATURE:-0.30}
      VISION_LLM_RETRIES: ${VISION_LLM_RETRIES:-2}
      VISION_LLM_RETRY_BACKOFF_SECONDS: ${VISION_LLM_RETRY_BACKOFF_SECONDS:-1.5}
      VISION_EXTRACTION_STRATEGY: ${VISION_EXTRACTION_STRATEGY:-structured}
      VISION_STRUCTURED_FALLBACK_TWO_STAGE: ${VISION_STRUCTURED_FALLBACK_TWO_STAGE:-true}
      VISION_SEND_ORIGINAL_UNDER_BYTES: ${VISION_SEND_ORIGINAL_UNDER_BYTES:-8388608}
      VISION_IMAGE_MAX_SIDE: ${VISION_IMAGE_MAX_SIDE:-2560}
      VISION_IMAGE_JPEG_QUALITY: ${VISION_IMAGE_JPEG_QUALITY:-92}
      OCR_INCLUDE_CANDIDATES: ${OCR_INCLUDE_CANDIDATES:-false}
      PARALLEL_TRADITIONAL_LLM_FALLBACK: ${PARALLEL_TRADITIONAL_LLM_FALLBACK:-false}
      TRADITIONAL_EARLY_RETURN_MIN_SCORE: ${TRADITIONAL_EARLY_RETURN_MIN_SCORE:-80}
      TRADITIONAL_EARLY_RETURN_MIN_MEDICATIONS: ${TRADITIONAL_EARLY_RETURN_MIN_MEDICATIONS:-2}
      TRADITIONAL_SUSPICIOUS_QUANTITY_LIMIT: ${TRADITIONAL_SUSPICIOUS_QUANTITY_LIMIT:-120}
    volumes:
      - ocr-dev-paddle-models:/root/.paddleocr
      - ocr-dev-vietocr-models:/root/.cache/vietocr
    restart: unless-stopped
    networks:
      - medispace-dev-net

  # ── Chat AI Service (Python / FastAPI / Gemma) ───────────────────────
  chat-ai-service:
    build:
      context: ../MEDISPACE_Python_Services/MEDISPACE_Chat_AI_Service
      dockerfile: Dockerfile
    container_name: medispace-chat-ai-dev
    ports:
      - "8003:8003"
    env_file:
      - ../MEDISPACE_Python_Services/MEDISPACE_Chat_AI_Service/.env
    environment:
      # █ Khi chạy trong Docker, dùng service name thay vì localhost
      TYPESENSE_URL: http://typesense:8108
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-medispace-ts-secret}
    volumes:
      - ../MEDISPACE_Python_Services/MEDISPACE_Chat_AI_Service/src:/app/src       # Hot-reload guardrails/agents
      - ../MEDISPACE_Python_Services/MEDISPACE_Chat_AI_Service/tests:/app/tests   # Sync test files
    depends_on:
      - typesense
      - redis
    restart: unless-stopped
    networks:
      - medispace-dev-net

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: medispace-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - medispace-dev-net

  # ── Typesense ─────────────────────────────────────────────────────────────
  typesense:
    image: typesense/typesense:27.1
    container_name: medispace-typesense-dev
    ports:
      - "7700:8108"
    volumes:
      - ../typesense-data-dev:/data
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-medispace-ts-secret}
      TYPESENSE_DATA_DIR: /data
    restart: unless-stopped
    networks:
      - medispace-dev-net


# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  redis-dev-data:
    driver: local
  ml-dev-models:
    driver: local
  ocr-dev-paddle-models:
    driver: local
  ocr-dev-vietocr-models:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  medispace-dev-net:
    driver: bridge
