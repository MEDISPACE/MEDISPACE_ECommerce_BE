# =====================================================
# MEDISPACE - Docker Compose (PRODUCTION)
# Dùng để: deploy trên server, dùng image từ DockerHub
# Chạy: docker compose up -d  (trên server sau khi CI/CD push image)
# Dev local: dùng docker-compose.dev.yml thay thế
# =====================================================

services:

  # ── Backend (Node.js / Express / TypeScript) ──────────────────────────────
  backend:
    image: ${DOCKERHUB_USERNAME:-bao110304}/medispace-be:${BACKEND_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medispace-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: 8108
      TYPESENSE_AUTO_RECONCILE: "false"
      OCR_SERVICE_URL: http://ocr-service:8001
      PRESCRIPTION_OCR_MODE: ${PRESCRIPTION_OCR_MODE:-parallel}
      ML_SERVICE_URL: http://ml-service:8002
      ML_SERVICE_TOKEN: ${ML_SERVICE_TOKEN:?ML_SERVICE_TOKEN is required}
      CHAT_AI_URL: http://chat-ai-service:8003
      REDIS_URL: redis://redis:6379
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - redis
      - typesense
      - ocr-service
      - ml-service
      - chat-ai-service
    restart: unless-stopped
    networks:
      - medispace-net

  # ── Frontend (React / Vite → Nginx) ──────────────────────────────────────
  frontend:
    image: ${DOCKERHUB_USERNAME:-bao110304}/medispace-fe:${FRONTEND_TAG:-latest}
    build:
      context: ../MEDISPACE_ECommerce_FE
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_GOOGLE_REDIRECT_URI: ${VITE_GOOGLE_REDIRECT_URI}
    container_name: medispace-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - medispace-net

  # ── OCR Service (Python / FastAPI / PaddleOCR + VietOCR) ─────────────────
  ocr-service:
    image: ${DOCKERHUB_USERNAME:-bao110304}/medispace-ocr:${OCR_SERVICE_TAG:-latest}
    build:
      context: ../MEDISPACE_Python_Services/MEDISPACE_OCR_Service
      dockerfile: Dockerfile
    container_name: medispace-ocr
    ports:
      - "8001:8001"
    env_file:
      - ../MEDISPACE_Python_Services/MEDISPACE_OCR_Service/.env
    environment:
      CUSTOM_LLM_MAX_TOKENS: ${CUSTOM_LLM_MAX_TOKENS:-4096}
      VISION_LLM_MODEL: ${VISION_LLM_MODEL:-gemma-4-e4b-it.gguf}
      VISION_LLM_TIMEOUT_SECONDS: ${VISION_LLM_TIMEOUT_SECONDS:-75}
      VISION_BRANCH_TIMEOUT_SECONDS: ${VISION_BRANCH_TIMEOUT_SECONDS:-120}
      OCR_RESPONSE_BUDGET_SECONDS: ${OCR_RESPONSE_BUDGET_SECONDS:-130}
      VISION_LLM_MAX_TOKENS: ${VISION_LLM_MAX_TOKENS:-4096}
      VISION_LLM_FREEFORM_MAX_TOKENS: ${VISION_LLM_FREEFORM_MAX_TOKENS:-4096}
      VISION_LLM_FREEFORM_TEMPERATURE: ${VISION_LLM_FREEFORM_TEMPERATURE:-0.30}
      VISION_LLM_RETRIES: ${VISION_LLM_RETRIES:-2}
      VISION_LLM_RETRY_BACKOFF_SECONDS: ${VISION_LLM_RETRY_BACKOFF_SECONDS:-1.5}
      VISION_EXTRACTION_STRATEGY: ${VISION_EXTRACTION_STRATEGY:-structured}
      VISION_STRUCTURED_FALLBACK_TWO_STAGE: ${VISION_STRUCTURED_FALLBACK_TWO_STAGE:-true}
      VISION_SEND_ORIGINAL_UNDER_BYTES: ${VISION_SEND_ORIGINAL_UNDER_BYTES:-8388608}
      VISION_IMAGE_MAX_SIDE: ${VISION_IMAGE_MAX_SIDE:-2560}
      VISION_IMAGE_JPEG_QUALITY: ${VISION_IMAGE_JPEG_QUALITY:-92}
      OCR_INCLUDE_CANDIDATES: ${OCR_INCLUDE_CANDIDATES:-false}
      PARALLEL_TRADITIONAL_LLM_FALLBACK: ${PARALLEL_TRADITIONAL_LLM_FALLBACK:-false}
      TRADITIONAL_EARLY_RETURN_MIN_SCORE: ${TRADITIONAL_EARLY_RETURN_MIN_SCORE:-80}
    volumes:
      - ocr-paddle-models:/root/.paddleocr
      - ocr-vietocr-models:/root/.cache/vietocr
      - ../MEDISPACE_Python_Services/MEDISPACE_OCR_Service/logs:/app/logs
    restart: unless-stopped
    networks:
      - medispace-net

  # ── Chat AI Service (Python / FastAPI / Gemma) ──────────────────────────
  chat-ai-service:
    image: ${DOCKERHUB_USERNAME:-bao110304}/medispace-chat-ai:${CHAT_AI_SERVICE_TAG:-latest}
    build:
      context: ../MEDISPACE_Python_Services/MEDISPACE_Chat_AI_Service
      dockerfile: Dockerfile
    container_name: medispace-chat-ai
    ports:
      - "8003:8003"
    env_file:
      - ../MEDISPACE_Python_Services/MEDISPACE_Chat_AI_Service/.env
    environment:
      # Override để đảm bảo dùng đúng service name trong Docker network
      TYPESENSE_URL: http://typesense:8108
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-medispace-ts-secret}
    restart: unless-stopped
    networks:
      - medispace-net

  # ── ML Recommendation Service (Python / FastAPI / scikit-learn) ──────────
  ml-service:
    image: ${DOCKERHUB_USERNAME:-bao110304}/medispace-ml:${ML_SERVICE_TAG:-latest}
    build:
      context: ../MEDISPACE_Python_Services/MEDISPACE_ML_Service
      dockerfile: Dockerfile
    container_name: medispace-ml
    env_file:
      - ../MEDISPACE_Python_Services/MEDISPACE_ML_Service/.env
    environment:
      ML_SERVICE_TOKEN: ${ML_SERVICE_TOKEN:?ML_SERVICE_TOKEN is required}
      BE_SERVICE_URLS: http://backend:8000
    restart: unless-stopped
    networks:
      - medispace-net

  # ── Redis (Cache Layer) ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: medispace-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - medispace-net

  # ── Typesense (Search Engine) ─────────────────────────────────────────────
  typesense:
    image: typesense/typesense:27.1
    container_name: medispace-typesense
    ports:
      - "7700:8108"
    volumes:
      - ../typesense-data:/data
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-medispace-ts-secret}
      TYPESENSE_DATA_DIR: /data
    restart: unless-stopped
    networks:
      - medispace-net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  redis-data:
    driver: local
  ocr-paddle-models:
    driver: local
  ocr-vietocr-models:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  medispace-net:
    driver: bridge
