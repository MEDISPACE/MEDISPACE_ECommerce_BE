name: Backend Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/medispace-be

permissions:
  contents: read
  actions: write

jobs:
  # ── CI: Lint + Type Check ─────────────────────────────────────────────────
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm install
      - run: npm run lint || true   # warn only — pre-existing issues
      - run: npx tsc --noEmit || true   # warn only

  # ── Build & Push Docker Image ─────────────────────────────────────────────
  build-push:
    needs: ci
    if: github.event_name == 'push'    # only on merge, not PR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trigger deploy (deploy.yml in this repo) ──────────────────────────
      - name: Trigger deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_PAT }}
          repository: ${{ github.repository }}
          event-type: deploy
          client-payload: '{"service": "backend", "image_tag": "${{ github.sha }}"}'
