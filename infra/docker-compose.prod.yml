# =====================================================
# MEDISPACE - Docker Compose (Production)
# Image-based deployment via Docker Hub
# =====================================================

services:
  backend:
    image: ${DOCKERHUB_USERNAME}/medispace-be:${BACKEND_TAG:-latest}
    container_name: medispace-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: 8108
      OCR_SERVICE_URL: http://ocr-service:8001
      ML_SERVICE_URL: http://ml-service:8002
      ML_SERVICE_TOKEN: ${ML_SERVICE_TOKEN:?ML_SERVICE_TOKEN is required}
      REDIS_URL: redis://redis:6379
    volumes:
      - ../uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      typesense:
        condition: service_started
      ocr-service:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - medispace-net

  frontend:
    image: ${DOCKERHUB_USERNAME}/medispace-fe:${FRONTEND_TAG:-latest}
    container_name: medispace-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - medispace-net

  ocr-service:
    image: ${DOCKERHUB_USERNAME}/medispace-ocr:${OCR_SERVICE_TAG:-latest}
    container_name: medispace-ocr
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    volumes:
      - ocr-paddle-models:/root/.paddleocr
      - ocr-vietocr-models:/root/.cache/vietocr
      - ../logs/ocr:/app/logs
    restart: unless-stopped
    networks:
      - medispace-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  ml-service:
    image: ${DOCKERHUB_USERNAME}/medispace-ml:${ML_SERVICE_TAG:-latest}
    container_name: medispace-ml
    env_file:
      - ../.env
    environment:
      ML_SERVICE_TOKEN: ${ML_SERVICE_TOKEN:?ML_SERVICE_TOKEN is required}
      BE_SERVICE_URLS: http://backend:8000
    restart: unless-stopped
    networks:
      - medispace-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: medispace-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - medispace-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  typesense:
    image: typesense/typesense:27.1
    container_name: medispace-typesense
    ports:
      - "7700:8108"
    volumes:
      - ../typesense-data:/data
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      TYPESENSE_DATA_DIR: /data
    restart: unless-stopped
    networks:
      - medispace-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8108/health | grep -q ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  redis-data:
    driver: local
  ocr-paddle-models:
    driver: local
  ocr-vietocr-models:
    driver: local

networks:
  medispace-net:
    driver: bridge
